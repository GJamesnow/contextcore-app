<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextCore Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 8px; margin-top: 1rem; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input { padding: 10px; width: 60%; margin-right: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>ContextCore-MVP</h1>
    <p>Enter a location to analyze commercial viability.</p>

    <div class="card">
        <input type="text" id="addressInput" placeholder="e.g. 4300 South Park Dr, Stony Plain">
        <button onclick="analyzeLocation()">Analyze Location</button>
    </div>

    <div id="resultsArea" class="hidden">
        <div class="card" style="background: #f8f9fa;">
            <h2 id="resTitle">Location Name</h2>
            <p><strong>Market:</strong> <span id="resMarket"></span></p>
            <p><strong>Population:</strong> <span id="resPop"></span> | <strong>Avg Income:</strong> $<span id="resInc"></span></p>
            <p><strong>Score:</strong> <span id="resScore" style="font-weight:bold; font-size: 1.2em;"></span></p>
            <hr>
            <h3>Competitors Nearby</h3>
            <ul id="resRadar"></ul>
        </div>
    </div>

    <script>
        async function analyzeLocation() {
            const address = document.getElementById('addressInput').value;
            const btn = document.querySelector('button');
            
            btn.innerText = "Analyzing...";
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, desc: "Retail" })
                });
                
                const data = await response.json();
                
                // Update UI
                document.getElementById('resTitle').innerText = data.loc.address;
                document.getElementById('resMarket').innerText = data.demo.market;
                document.getElementById('resPop').innerText = data.demo.pop.toLocaleString();
                document.getElementById('resInc').innerText = data.demo.inc.toLocaleString();
                document.getElementById('resScore').innerText = `${data.fit.score} / 100 (${data.fit.status})`;
                
                // Update Competitor List
                const list = document.getElementById('resRadar');
                list.innerHTML = '';
                data.radar.list.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = `${item.name} (${item.type}) - ${item.dist}`;
                    list.appendChild(li);
                });

                document.getElementById('resultsArea').classList.remove('hidden');

            } catch (err) {
                alert("Error connecting to server.");
                console.error(err);
            }
            
            btn.innerText = "Analyze Location";
        }
    </script>
</body>
</html>
