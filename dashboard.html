<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f1f5f9; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; padding: 25px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1e40af; }
        .input-group { background: white; padding: 15px; border-radius: 12px; display: flex; gap: 10px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .val { font-size: 28px; font-weight: 800; color: #0f172a; }
        .label { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; }
        
        #map { height: 400px; width: 100%; border-radius: 12px; border: 2px solid #e2e8f0; }
        #loader { display: none; margin-left: 10px; color: #64748b; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="margin-top:0;">ContextCore</h3>
    <p style="opacity:0.7; font-size:14px;">Professional Suite</p>
</div>

<div class="main">
    <div class="header">
        <h1>Intelligence Dashboard</h1>
        <button class="btn" onclick="downloadReport()">Download PDF Report</button>
    </div>

    <div class="input-group">
        <input type="text" id="addr" placeholder="Enter Address (e.g. 100 Main St, Edmonton)">
        <button class="btn" onclick="analyze()">Run Analysis</button>
        <span id="loader">Processing...</span>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Opportunity Score</div>
            <div class="val" id="score">--</div>
        </div>
        <div class="card">
            <div class="label">Market Status</div>
            <div class="val" id="status">--</div>
        </div>
        <div class="card">
            <div class="label">Missing Amenities (Void)</div>
            <div class="val" id="voids" style="font-size: 18px; color: #ef4444;">--</div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    let map = L.map('map').setView([53.5, -113.5], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    let currentAddr = "";

    async function analyze() {
        const addr = document.getElementById('addr').value;
        if(!addr) return alert("Enter address");
        
        document.getElementById('loader').style.display = 'inline';
        
        try {
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: addr})
            });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error);

            // Update UI
            document.getElementById('score').innerText = data.fit.score;
            document.getElementById('status').innerText = data.fit.status;
            
            const voids = data.voids;
            document.getElementById('voids').innerText = voids.length > 0 ? voids.join(', ') : "Saturated";
            
            currentAddr = data.loc.address;

            // Update Map
            map.setView([data.loc.lat, data.loc.lng], 14);
            // Clear markers
            map.eachLayer(layer => {
                if (layer instanceof L.Marker) map.removeLayer(layer);
            });
            L.marker([data.loc.lat, data.loc.lng]).addTo(map);

        } catch(e) {
            alert(e.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function downloadReport() {
        if(!currentAddr) return alert("Please run an analysis first.");
        
        const paymentLink = 'YOUR_STRIPE_PAYMENT_HERE'; // Replace with real link
        if(confirm("Download Professional Brief ($49/mo)?")) {
            window.open(paymentLink, '_blank');
            // This triggers the server to build and send the file
            window.location.href = `/download_pdf?address=${encodeURIComponent(currentAddr)}`;
        }
    }

    // --- AUTO-RUN TEST ---
    document.addEventListener('DOMContentLoaded', () => {
        // Pre-fill the address
        const testAddress = "4300 South Park Dr, Stony Plain, AB";
        document.getElementById('addr').value = testAddress;
        
        // Trigger the analysis immediately
        console.log("Auto-running test for:", testAddress);
        analyze();
    });
</script>

</body>
</html>
