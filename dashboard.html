<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 300px; }
        #map { height: 400px; width: 100%; border-radius: 8px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .val { font-size: 24px; font-weight: 800; }
        .label { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>ContextCore</h3>
    <p style="opacity: 0.7; font-size: 14px;">Intelligence Suite</p>
</div>

<div class="main">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Dashboard</h1>
        <button class="btn" onclick="openReport()">Generate PDF Report</button>
    </div>

    <div style="margin: 20px 0;">
        <input type="text" id="addr" placeholder="Enter Address...">
        <button class="btn" onclick="analyze()">Analyze</button>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Score</div>
            <div class="val" id="score">--</div>
        </div>
        <div class="card">
            <div class="label">Status</div>
            <div class="val" id="status" style="font-size: 18px;">--</div>
        </div>
        <div class="card">
            <div class="label">Voids</div>
            <div class="val" id="voids" style="color: #ef4444">--</div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    let map = L.map('map').setView([53.5, -113.5], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    let currentAddr = "";

    async function analyze() {
        const addr = document.getElementById('addr').value;
        if(!addr) return alert("Enter address");
        
        const res = await fetch('/analyze', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({address: addr})
        });
        const data = await res.json();
        
        if(data.error) return alert(data.error);

        document.getElementById('score').innerText = data.score;
        document.getElementById('status').innerText = data.status;
        document.getElementById('voids').innerText = data.void_count;
        currentAddr = data.address;

        map.setView([data.lat, data.lng], 14);
        L.marker([data.lat, data.lng]).addTo(map);
    }

    function openReport() {
        if(!currentAddr) return alert("Run analysis first");
        // Opens the CLEAN report view in a new tab, which auto-triggers print
        window.open(`/download_pdf?address=${encodeURIComponent(currentAddr)}`, '_blank');
    }
</script>

</body>
</html>
